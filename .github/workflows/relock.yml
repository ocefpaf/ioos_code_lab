name: relock

# no permissions by default
permissions: {}

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  relock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup Micromamba
      uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
      with:
        environment-name: RELOCK
        init-shell: bash
        create-args: >-
          python=3
          conda-lock

    - name: re-lock
      run: >
        cd .binder/
        && conda-lock --conda=micromamba -f environment.yml

    - name: Check for changes
      id: check_changes
      run: >
        git diff --quiet origin/main -- ".binder/conda-lock.yml" || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Create PR if file changed
      if: steps.check_changes.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  #v8.1.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Update lockfile"
        branch: "update-lockfile-$(date +%s)"
        title: "Update lockfile"
        body: "Updating the lockfile."
        delete-branch: true
        labels: Bot
